apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-demo-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: demo.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: platform-demo-svc
            port:
              number: 80