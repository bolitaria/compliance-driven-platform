name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --------------------------------------------------
  # 1. Lint + Unit Tests (Compliance & Memory)
  # --------------------------------------------------
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install flake8
      - name: Lint with flake8 (report only)
        run: flake8 app/ --count --max-complexity=10 --statistics --exit-zero
      - name: Run unit tests (Compliance‑as‑Code, Governed Memory)
        working-directory: app
        run: python -m pytest tests/ -v

  # --------------------------------------------------
  # 2. Security Gate: Vulnerabilities + Secrets
  #    Fails on HIGH/CRITICAL vulns or any leaked secret
  # --------------------------------------------------
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy with strict security gate
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          scanners: vuln,secret

  # --------------------------------------------------
  # 3. Policy‑as‑Code: OPA checks on K8s manifests
  # --------------------------------------------------
  opa-policy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install conftest
        run: |
          curl -sL https://github.com/open-policy-agent/conftest/releases/download/v0.52.0/conftest_0.52.0_Linux_x86_64.tar.gz | tar xz
          sudo mv conftest /usr/local/bin/
      - name: Check K8s manifests against compliance policies
        run: conftest test k8s/*.yaml --policy policies/compliance_test.rego